<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Command Center - Terminal Admin</title>
    <style>
        body { background: #0B0E11; color: #EAECEF; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.6;}
        h1 { color: #0ECB81; border-bottom: 1px solid #262F38; padding-bottom: 10px; }
        label { display: block; color: #848E9C; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-top: 25px;}
        select, textarea { width: 100%; box-sizing: border-box; background: #151A20; color: #EAECEF; border: 1px solid #262F38; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 14px;}
        textarea { height: 180px; resize: vertical; }
        button { background: #0ECB81; color: #0B0E11; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 30px; transition: 0.2s;}
        button:hover { background: #0b9e65; }
        #status { margin-top: 20px; color: #0ECB81; font-weight: bold; text-align: center; height: 24px;}
    </style>
</head>
<body>
    <h1>Terminal Command Center</h1>
    
    <label>Select Asset to Edit</label>
    <select id="ticker" onchange="fetchCurrentData()">
        <option value="URA">Uranium (URA)</option>
        <option value="SI=F">Silver (SI=F)</option>
        <option value="LIT">Lithium (LIT)</option>
        <option value="GC=F">Gold (GC=F)</option>
        <option value="CL=F">Crude Oil (CL=F)</option>
        <option value="RIO">Iron Ore (RIO)</option>
    </select>

    <label>Analyst Consensus HTML (Overweight/Neutral Badges)</label>
    <textarea id="analysts"></textarea>

    <label>Macro Drivers HTML (Bulleted List)</label>
    <textarea id="drivers"></textarea>

    <label>Key Risks HTML (Bulleted List)</label>
    <textarea id="risks"></textarea>

    <button onclick="deployUpdates()">Deploy to Live Terminal</button>
    <div id="status"></div>

    <script>
        // UPDATE THIS TO YOUR REAL RENDER URL
        const API_URL = "https://commodity-api-xyz.onrender.com"; 

        async function fetchCurrentData() {
            const ticker = document.getElementById('ticker').value;
            try {
                const res = await fetch(`${API_URL}/admin/data/${ticker}`);
                if (!res.ok) throw new Error("Data not found");
                const data = await res.json();
                document.getElementById('analysts').value = data.analysts;
                document.getElementById('drivers').value = data.drivers;
                document.getElementById('risks').value = data.risks;
            } catch (e) {
                console.error("Error fetching data:", e);
                document.getElementById('status').innerText = "Connecting to database...";
            }
        }

        async function deployUpdates() {
            const payload = {
                ticker: document.getElementById('ticker').value,
                analysts: document.getElementById('analysts').value,
                drivers: document.getElementById('drivers').value,
                risks: document.getElementById('risks').value
            };

            document.getElementById('status').innerText = "Deploying to cloud database...";
            document.getElementById('status').style.color = "#848E9C";

            const res = await fetch(`${API_URL}/admin/update`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                document.getElementById('status').innerText = "Update Deployed Successfully! Live site is updated.";
                document.getElementById('status').style.color = "#0ECB81";
                setTimeout(() => document.getElementById('status').innerText = "", 4000);
            }
        }
        
        fetchCurrentData();
    </script>
</body>
</html>
